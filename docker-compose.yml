services:
  pol-duck:
    build: .
    image: suh1088/pol-duck-server:latest
    container_name: pol-duck
    restart: unless-stopped
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 3s
      start_period: 5s
