name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd ~/26s-w2-c3-02
            git pull origin main

            docker build -t cops-and-ducks-server .

            docker stop cops-and-ducks-server || true
            docker rm cops-and-ducks-server || true

            docker run -d \
              --name cops-and-ducks-server \
              --restart unless-stopped \
              -p 127.0.0.1:8080:8080 \
              cops-and-ducks-server

            docker ps
            curl -f http://localhost:8080/healthz